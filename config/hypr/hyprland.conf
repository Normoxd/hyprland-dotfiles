# ============================================
#  XINDICATE'S HYPRLAND (Modified by Normo!)
#  Clean + stable Hyprland setup
# ============================================

monitor=,preferred,auto,1

# --- Autostart ---
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = waybar
exec-once = mako
exec-once = wl-paste --watch cliphist store
exec-once = swaybg -i /path/to/your/wallpaper.png
exec-once = paplay /path/to/your/startup_sound.oga

# --- Environment ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    touchpad {
        natural_scroll = yes
    }
}

# --- General look ---
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 2
    col.inactive_border = rgba(e6e6fa1a)
    col.active_border = rgba(bdcdf466)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 5

    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }

}

animations {
    enabled = yes
    animation = windows, 1, 6, default
    animation = border, 1, 6, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 6, default
}

# --- Dwindle ---
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# --- Master ---
master {
    new_status = master
}

# --- Gestures ---
gestures {
    gesture = 4, horizontal, workspace
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0
    workspace_swipe_min_speed_to_force = 100
    workspace_swipe_invert = true
    workspace_swipe_create_new = true
    workspace_swipe_forever = true
}

# --- Keybinds ---
bind = SUPER, SPACE, exec, kitty
bind = SUPER, Q, killactive
bind = SUPER, F11, fullscreen
bind = SUPER, W, togglefloating
bind = SUPER, R, exec, wofi --show drun
bind = SUPER, P, pseudo
bind = SUPER, S, togglesplit
bind = SUPER, X, exec, pwropts
bind = SUPER, A, exec, control
bind = SUPER, V, exec, cliphist list | wofi -S dmenu | cliphist decode | wl-copy
bind = SUPER, Z, exec, zen
bind = SUPER, F, exec, nautilus

# Move/resize windows with mouse (SUPER + mouse)
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# --- Move focus (arrow keys) ---
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# --- Move windows (SUPER + SHIFT + arrows) ---
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d

# --- Workspaces ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10
bind = SUPER CTRL, right, movetoworkspace, +1
bind = SUPER CTRL, left, movetoworkspace, -1

# --- Screenshots (grim + slurp) ---
# Full screen -> save + clipboard
bind = , Print, exec, grim - | tee ~/Pictures/Screenshots/shot-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy

# Area select -> save + clipboard
bind = SHIFT, Print, exec, slurp | grim -g - - | tee ~/Pictures/Screenshots/shot-$(date +'%Y-%m-%d_%H-%M-%S').png | wl-copy


# --- Volume ---
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

# --- Brightness ---
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

# --- Reload Hyprland ---
bind = SUPER SHIFT, R, exec, hyprctl reload
